name: Electron Forge Build

on:
  workflow_dispatch:

jobs:
  build-linux:
    permissions:
      contents: write # to upload artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - name: Install dependencies
        run: |
          npm install
      - name: Build application
        run: |
          npm run make

      - name: "Install @actions/artifact module"
        id: install-actions-artifact-module
        run: |
          npm install @actions/artifact@6.2.0 --global
          echo "NODE_PATH=$(npm root --quiet -g)" >> $GITHUB_ENV
      
      - name: "Extract Actions runtime variables" 
        id: extract-runtime-environment-variables
        uses: actions/github-script@v7
        env:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL'])
            core.exportVariable('ACTIONS_RUNTIME_URL', process.env['ACTIONS_RUNTIME_URL'])
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'])
            
      - name: "Upload folders as artifacts"
        id: upload-artifacts
        run: |
          const fs = require('fs')
          const path = require('path')
          const { DefaultArtifactClient } = require('@actions/artifact')

          const artifact = new DefaultArtifactClient()

          function listFilesRecursive (dir) {
            let results = []
            const list = fs.readdirSync(dir)
            list.forEach(function (file) {
              const filePath = path.join(dir, file)
              const stat = fs.statSync(filePath)
              if (stat && stat.isDirectory()) {
                results = results.concat(listFilesRecursive(filePath))
              } else if (stat && stat.isFile()) {
                results.push(filePath)
              }
            })
            return results
          }

          const files = listFilesRecursive('out/make')
          files.forEach(file => {
            const artifactName = path.basename(file)
            console.log(`Uploading artifact: ${artifactName} from ${file}`)
            artifact.uploadArtifact(artifactName, file)
          })
